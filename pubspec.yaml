name: task_manager_app
description: A Flutter Task Manager App using Back4App (BaaS) for CRUD operations.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  parse_server_sdk_flutter: 10.7.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  flutter_slidable: ^3.0.1
  google_fonts: ^6.1.0
  fluttertoast: ^8.2.4
  lottie: ^3.0.0
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
